spring.application.name=Food_Delivery

# ============================================
# FOOD DELIVERY APPLICATION CONFIGURATION
# ============================================

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================
# Database Configuration (MySQL)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/rest2?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=081996
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA Configuration - FIXED FOR SPRING BOOT 3.x
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ============================================
# Connection Pool Configuration (HikariCP)
# ============================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JWT Configuration - FIXED (using app prefix to avoid warnings)
# ============================================
app.jwt.secret=fooddeliveryappsecretkey2024
app.jwt.expiration=86400000

# ============================================
# Logging Configuration
# ============================================
logging.level.org.springframework.security=DEBUG
logging.level.com.fooddelivery=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# File Upload Configuration
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# Data Initialization
# ============================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ============================================
# CORS Configuration - FIXED for Spring Boot 3.x
# ============================================
spring.web.cors.allow-credentials=true
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Allow circular references (NOT RECOMMENDED for production)
spring.main.allow-circular-references=true