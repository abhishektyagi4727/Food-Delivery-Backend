spring.application.name=Food_Delivery

# ============================================
# FOOD DELIVERY APPLICATION CONFIGURATION
# ============================================

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# Connection Pool Configuration (HikariCP)
# ============================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JWT Configuration
# ============================================
app.jwt.secret=fooddeliveryappsecretkey2024
app.jwt.expiration=86400000

# ============================================
# Logging Configuration
# ============================================
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# File Upload Configuration
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# Data Initialization
# ============================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ============================================
# CORS Configuration
# ============================================
spring.web.cors.allow-credentials=true
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://java-full-stack-project-ivory.vercel.app//
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Allow circular references (temporary for development)
spring.main.allow-circular-references=true

# Change from DEBUG to WARN or ERROR for production
logging.level.com.fooddelivery=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=ERROR